name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Publish self-contained application
        run: >
          dotnet publish src/HubRoute/HubRoute.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o artifacts/HubRoute-${{ matrix.rid }}

      - name: Remove debug symbols
        shell: pwsh
        run: >
          Get-ChildItem -Path "artifacts/HubRoute-${{ matrix.rid }}"
          -Recurse -File -Include *.pdb,*.dbg
          | Remove-Item -Force

      - name: Create archive
        shell: pwsh
        run: Compress-Archive -Path "artifacts/HubRoute-${{ matrix.rid }}/*" -DestinationPath "HubRoute-${{ matrix.rid }}.zip"

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: HubRoute-${{ matrix.rid }}
          path: HubRoute-${{ matrix.rid }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          pattern: HubRoute-*
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          release_title="HubRoute $GITHUB_REF_NAME - Unity Hub 国际版下载与启动工具"
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            gh release create "$GITHUB_REF_NAME" artifacts/*.zip --title "$release_title" --generate-notes --prerelease --verify-tag
          else
            gh release create "$GITHUB_REF_NAME" artifacts/*.zip --title "$release_title" --generate-notes --latest --verify-tag
          fi
