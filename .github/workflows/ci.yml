name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore HubRoute.slnx

      - name: Test
        run: dotnet test HubRoute.slnx -c Release --no-restore --verbosity minimal

      - name: Check vulnerable packages
        run: dotnet list HubRoute.slnx package --vulnerable --include-transitive
